<!DOCTYPE html>
<html>
<head>
<title>State Management Example</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .active { color: green; font-weight: bold; }
  .inactive { color: red; }
</style>
</head>
<body>

  <h1>State Toggle Demo</h1>
  <p id="status-text" class="inactive">The current state is: OFF</p>
  <button id="toggleBtn">Toggle State</button>

  <script>
    // 1. STATE: We define a variable outside the function.
    // This lives in memory as long as the page is loaded.
    let isStateOn = false;

    // 2. Select elements
    const button = document.getElementById('toggleBtn');
    const text = document.getElementById('status-text');

    // 3. Logic: Update state and reflect it in the UI
    button.addEventListener('click', function() {
      // Toggle the boolean value (true becomes false, false becomes true)
      isStateOn = !isStateOn;

      // Update the UI based on the new state
      if (isStateOn) {
        text.textContent = "The current state is: ON";
        text.className = "active";
      } else {
        text.textContent = "The current state is: OFF";
        text.className = "inactive";
      }
    });
  </script>

</body>
</html>
